<body>

<header class="page-header wrap">
  <div class="eyebrow">The record</div>
  <h1>Publications</h1>
  <p class="page-lede">Journal papers, conference papers, and posters, newest first. Search by keyword, author, or venue.</p>
</header>

<main class="wrap">
  <section style="border-bottom:none;padding-top:20px;">
    <div class="pub-controls">
      <input id="pubSearch" type="text" placeholder="Search title, author, or venue…">
      <select id="yearFilter"><option value="">All years</option></select>
    </div>
    <div class="pub-count" id="pubCount"></div>
    <div id="pubList"></div>
    <div class="no-results" id="noResults" style="display:none;">No publications match that search.</div>
  </section>
</main>

<footer>
  <div class="wrap">
    <p class="mono" style="margin-top:10px;">© 2026 Yin Minn Pa Pa</p>
  </div>
</footer>

<script src="data.js"></script>
<script>
  const pubListEl = document.getElementById('pubList');
  const pubCountEl = document.getElementById('pubCount');
  const noResultsEl = document.getElementById('noResults');
  const yearSelect = document.getElementById('yearFilter');
  const searchInput = document.getElementById('pubSearch');

  const years = [...new Set(PUBS.map(p=>p.y))].sort((a,b)=>b-a);
  years.forEach(y=>{
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    yearSelect.appendChild(opt);
  });

  function renderPubs(){
    const q = searchInput.value.trim().toLowerCase();
    const yr = yearSelect.value;
    const filtered = PUBS.filter(p=>{
      if(yr && String(p.y) !== yr) return false;
      if(!q) return true;
      const hay = (p.t+' '+p.a+' '+p.v+' '+p.tags.join(' ')).toLowerCase();
      return hay.includes(q);
    });
    pubCountEl.textContent = filtered.length + ' of ' + PUBS.length + ' publications';
    noResultsEl.style.display = filtered.length ? 'none' : 'block';
    renderGroupedByYear(pubListEl, filtered, false);
  }
  searchInput.addEventListener('input', renderPubs);
  yearSelect.addEventListener('change', renderPubs);
  renderPubs();
</script>
</body>
</html>
